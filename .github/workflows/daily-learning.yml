name: Daily Learning System - 07:00 JST

on:
  schedule:
    # 毎日 22:00 UTC = 毎朝 07:00 JST（COO判定の前に実行）
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  learning-extraction:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Extract Learning Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 .github/scripts/extract_learning.py

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 学習データ/ 成功事例/ 失敗事例/ 2>/dev/null || true
          git commit -m "Daily: 学習データ抽出 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git pull --rebase || true
          git push
