name: Kindle Publication Prep (Manual)

on:
  workflow_dispatch:

jobs:
  prepare-kindle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install pandoc + 日本語フォント
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc fonts-noto-cjk
          pip install requests pillow python-docx

      - name: Prepare EPUB and metadata
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 .github/scripts/prepare_kindle_publication.py

      - name: Generate KDP-optimized DOCX
        run: python3 .github/scripts/generate_kdp_docx.py

      - name: Generate cover image
        run: python3 .github/scripts/generate_kindle_cover.py

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Kindle出版/
          git commit -m "Kindle出版準備: $(date +%Y-%m-%d)" || echo "No changes"
          git pull --rebase || true
          git push
