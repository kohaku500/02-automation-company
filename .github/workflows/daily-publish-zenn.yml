name: Daily Publish to Zenn - 18:00 JST

on:
  schedule:
    - cron: '0 9 * * *'  # 18:00 JST
  workflow_dispatch:

jobs:
  publish-zenn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Convert to Zenn format
        run: python3 .github/scripts/publish_to_zenn.py

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add articles/*.md
          git commit -m "Publish: Zenn記事自動生成 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git pull --rebase || true
          git push
