name: Daily COO Judgment - 09:00 JST
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  coo-judgment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Generate COO Judgment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os, requests
          from datetime import datetime
          api_key = os.environ.get('GEMINI_API_KEY')
          today = datetime.now().strftime('%Y-%m-%d')
          prompt = f"あなたはCOOです。本日（{today}）の経営判定レポートを生成してください。\n\n# COO判定レポート（{today}）\n\n## 本日の重要指標\n- MRR進捗: ¥XXXXX / ¥50,000目標\n- 新規顧客: X人\n- 顧客満足度: X.X / 5.0\n\n## 各部署への指示\n### マーケティング部\n- 優先商品: X案\n- プロモーション: X\n\n### コンテンツ制作部\n- 月間目標: X～X商品\n- 品質基準: X\n\n### クライアント管理部\n- リテンション優先度: X\n- 返金対応: X\n\n## 経営判定\n- 売上予測: ¥XXXXX\n- 最大課題: X\n- 対応方針: X\n\n判定完了"
          headers = {'Content-Type': 'application/json'}
          payload = {'contents': [{'parts': [{'text': prompt}]}]}
          response = requests.post(f'https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key={api_key}', headers=headers, json=payload)
          if response.status_code == 200:
              result = response.json()
              judgment = result['candidates'][0]['content']['parts'][0]['text']
              os.makedirs('運営ログ', exist_ok=True)
              with open(f'運営ログ/COO判定_{today}.md', 'w', encoding='utf-8') as f:
                  f.write(judgment)
              print(f"✅ COO判定完了")
          else:
              print(f"❌ エラー: {response.status_code}")
          EOF
      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 運営ログ/COO判定_*.md
          git commit -m "Daily: COO判定自動生成 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
