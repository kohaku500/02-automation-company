name: Daily note Analytics - 19:00 JST

on:
  schedule:
    - cron: '0 10 * * *'  # 19:00 JST
  workflow_dispatch:

jobs:
  note-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Get note analytics
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: python3 .github/scripts/check_note_analytics.py

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 運営ログ/note_アナリティクス_*.md 運営ログ/note_*.png 2>/dev/null || true
          git commit -m "Daily: note アナリティクス取得 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git pull --rebase || true
          git push
