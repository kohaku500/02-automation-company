name: Daily Secretary Task - 08:00 JST

on:
  schedule:
    # 毎日 23:00 UTC = 毎朝 08:00 JST
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  secretary-todo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate Daily ToDoList
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          import json
          from datetime import datetime
          import requests

          # Gemini API を呼び出してToDoリスト生成
          api_key = os.environ.get('GEMINI_API_KEY')
          today = datetime.now().strftime('%Y-%m-%d')

          # 秘書室のプロンプト
          prompt = f"""あなたは秘書室です。本日（{today}）のToDoリストを生成してください。

          フォーマット：
          # 本日のToDoリスト（{today}）

          ## 優先度S（売上直結・緊急）
          - [ ] 秘書室: システムの状態確認
          - [ ] マーケティング部: 本日の投稿ネタ提案準備

          ## 優先度A（重要）
          - [ ] 各部署: 昨日の課題フォローアップ

          ## 優先度B（通常）
          - [ ] 秘書室: 日報準備

          実行完了後、「ToDoリスト生成完了」と出力してください。"""

          # Gemini API に呼び出し
          headers = {
              'Content-Type': 'application/json'
          }

          payload = {
              'contents': [
                  {
                      'parts': [
                          {'text': prompt}
                      ]
                  }
              ]
          }

          response = requests.post(
              f'https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key={api_key}',
              headers=headers,
              json=payload
          )

          if response.status_code == 200:
              result = response.json()
              todo_content = result['candidates'][0]['content']['parts'][0]['text']

              # ファイル保存
              os.makedirs('運営ログ', exist_ok=True)
              file_path = f'運営ログ/ToDoリスト_{today}.md'
              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(todo_content)

              print(f"✅ ToDoリスト生成完了: {file_path}")
          else:
              print(f"❌ API呼び出し失敗: {response.status_code}")
              print(response.text)
          EOF

        - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 運営ログ/ToDoリスト_*.md
          git commit -m "Daily: ToDoリスト自動生成 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
