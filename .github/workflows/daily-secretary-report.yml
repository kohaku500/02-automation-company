name: Daily Secretary Report - 18:00 JST

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  secretary-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate Daily Report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          from datetime import datetime
          import requests

          api_key = os.environ.get('GEMINI_API_KEY')
          today = datetime.now().strftime('%Y-%m-%d')

          prompt = f"""あなたは秘書室です。本日（{today}）の日報を生成してください。

          # 日報（{today}）

          ## 売上・成果
          - 新規商品リリース: X件
          - note販売額: ¥XXXX
          - BOOTH販売額: ¥XXXX
          - Kindle販売額: ¥XXXX
          - 新規顧客数: X人

          ## 各部署成果概要
          ### マーケティング部
          - 投稿ネタ提供: X件
          - 競合分析: X社
          - 次期商品提案: X案

          ### コンテンツ制作部
          - 新規商品完成: X件
          - パッケージ作成: 状態

          ### クライアント管理部
          - 新規顧客: X人
          - 返金リクエスト: X件
          - 平均満足度: X.X

          ### 情報システム部
          - セキュリティスキャン: 状態
          - エラー修復: 状態

          ## 販売可能な商品チェック（本日）

          ### 3種の神器確認
          本日のコンテンツ制作部の出力について確認してください：
          - ✅/❌ 投稿させる文書（note_package.md / booth_package.md / kindle_manuscript.md の全3つ）
          - ✅/❌ プレゼン資料（presentation.html）
          - ✅/❌ アプリ（app.html）

          ### 販売開始判定
          3種全て揃っている場合：
          「✅ 本日の商品は販売開始可能です。3種の神器が完成しました。」

          不足している場合：
          「❌ 販売開始保留：以下の神器が未完成です：[神器名]」

          ## 課題・懸案事項
          - （該当があれば記載）
          - 販売チェックで不備があった場合は、原因も記載

          ## 明日の方針
          - COOからの指示待ち

          日報生成完了"""

          headers = {'Content-Type': 'application/json'}
          payload = {'contents': [{'parts': [{'text': prompt}]}]}

          response = requests.post(
              f'https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key={api_key}',
              headers=headers,
              json=payload
          )

          if response.status_code == 200:
              result = response.json()
              report_content = result['candidates'][0]['content']['parts'][0]['text']
              os.makedirs('運営ログ', exist_ok=True)
              file_path = f'運営ログ/日報_{today}.md'
              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(report_content)
              print(f"✅ 日報生成完了: {file_path}")
          else:
              print(f"❌ API呼び出し失敗: {response.status_code}")
              print(response.text)
          EOF

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 運営ログ/日報_*.md
          git commit -m "Daily: 日報自動生成 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
