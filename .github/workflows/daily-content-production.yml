name: Daily Content Production Report - 17:00 JST

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  content-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Content Report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          from datetime import datetime
          import requests

          api_key = os.environ.get('GEMINI_API_KEY')
          today = datetime.now().strftime('%Y-%m-%d')

          # マーケティング部の企画案ファイルを読む
          marketing_file = f'商品企画/企画案_{today}.md'
          marketing_content = ""
          if os.path.exists(marketing_file):
              with open(marketing_file, 'r', encoding='utf-8') as f:
                  marketing_content = f.read()

          prompt = f"""あなたはコンテンツ制作部です。以下のマーケティング部の企画案から、最も売れそうな1案を選んで、完全なnote商品パッケージを生成してください。

          【マーケティング部からの企画案】
          {marketing_content if marketing_content else "（企画案ファイルが見つかりません。独自にテーマを選定してください：初心者向けライフハック、副業で月5万稼ぐツール、など）"}

          ## 生成する内容（note向け）

          ### セクション1：商品情報
          - 商品タイトル: （note記事のタイトル）
          - 商品説明（note用・100文字程度）:
          - 想定価格: ¥1,500
          - 対象読者:

          ### セクション2：記事本文（5000文字以上）
          完全なnote記事本文を生成してください。以下の構成で：
          - はじめに（課題提示）
          - 背景・なぜこの問題が重要か
          - 解決方法（具体的で実行可能）
          - ケーススタディ・事例
          - まとめ・次のステップ

          ### セクション3：3大特典

          **特典1：ライフハック**
          - ユーザーの作業を5分短縮するチェックリスト・テンプレート
          （フォーマット、チェックリスト項目を含む）

          **特典2：副業ツール**
          - ユーザーが「0から1」を稼げるテンプレート・ツール
          （実用的なシート、計算ツールの説明を含む）

          **特典3：教育資料**
          - このジャンルの本質を5分で理解できる図解ベースの資料
          （テキスト形式で図解の説明を含む）

          パッケージ生成完了"""

          headers = {'Content-Type': 'application/json'}
          payload = {'contents': [{'parts': [{'text': prompt}]}]}

          response = requests.post(
              f'https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key={api_key}',
              headers=headers,
              json=payload
          )

          if response.status_code == 200:
              result = response.json()
              package_content = result['candidates'][0]['content']['parts'][0]['text']

              # パッケージフォルダを作成
              package_dir = f'商品パッケージ/{today}'
              os.makedirs(package_dir, exist_ok=True)

              # パッケージ内容を保存
              with open(f'{package_dir}/complete_package.md', 'w', encoding='utf-8') as f:
                  f.write(package_content)

              print(f"✅ note向け商品パッケージ生成完了: {package_dir}")
          else:
              print(f"❌ エラー: {response.status_code}")
          EOF

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 商品パッケージ/*/
          git commit -m "Daily: note向け商品パッケージ自動生成 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git pull --rebase || true
          git push
