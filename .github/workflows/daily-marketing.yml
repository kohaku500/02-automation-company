name: Daily Marketing Report - 10:00 JST

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  marketing-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Marketing Report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          from datetime import datetime
          import requests

          api_key = os.environ.get('GEMINI_API_KEY')
          today = datetime.now().strftime('%Y-%m-%d')

          prompt = f"""あなたはマーケティング部です。本日（{today}）に最も売れそうな商品企画案を10本生成してください。

          # note向け商品企画案10本（{today}）

          以下のフォーマットで、noteで売れそうな商品を10案提案してください：

          ## 企画案1
          - タイトル: （note記事のタイトル案）
          - ジャンル: ライフハック / 副業ツール / 教育資料 のいずれか
          - ターゲット層: （具体的なペルソナ）
          - 概要: （50文字程度の説明）
          - 差別化ポイント: （競合との違い）
          - 推定価格: ¥1,500
          - 売上見込み: 高/中/低

          ## 企画案2
          - タイトル: ...

          ## 企画案3
          - タイトル: ...

          ## 企画案4
          - タイトル: ...

          ## 企画案5
          - タイトル: ...

          ## 企画案6
          - タイトル: ...

          ## 企画案7
          - タイトル: ...

          ## 企画案8
          - タイトル: ...

          ## 企画案9
          - タイトル: ...

          ## 企画案10
          - タイトル: ...

          企画案生成完了"""

          headers = {'Content-Type': 'application/json'}
          payload = {'contents': [{'parts': [{'text': prompt}]}]}

          response = requests.post(
              f'https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key={api_key}',
              headers=headers,
              json=payload
          )

          if response.status_code == 200:
              result = response.json()
              report = result['candidates'][0]['content']['parts'][0]['text']
              os.makedirs('商品企画', exist_ok=True)
              with open(f'商品企画/企画案_{today}.md', 'w', encoding='utf-8') as f:
                  f.write(report)
              print(f"✅ 商品企画案生成完了")
          else:
              print(f"❌ エラー: {response.status_code}")
          EOF

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 商品企画/企画案_*.md
          git commit -m "Daily: 商品企画案自動生成 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git pull --rebase || true
          git push
