<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>習慣トラッカー</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding-top: 20px;
            padding-bottom: 20px;
        }
        .container {
            max-width: 768px; /* For mobile-first approach */
        }
        .card {
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            border-radius: 0.5rem;
        }
        .card-header {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border-radius: calc(0.5rem - 1px) calc(0.5rem - 1px) 0 0;
            padding: 1rem 1.25rem;
            font-size: 1.25rem;
        }
        .list-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
        }
        .list-group-item input[type="checkbox"] {
            transform: scale(1.5); /* Make checkbox larger */
            margin-right: 15px;
            cursor: pointer;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25);
            border-color: #007bff;
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
        .btn-danger {
            padding: .375rem .75rem; /* Bootstrap default size */
            font-size: .875rem;
        }
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }
        #habitList .list-group-item:first-child {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
        #habitList .list-group-item:last-child {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .card-header {
                font-size: 1.1rem;
                padding: 0.8rem 1rem;
            }
            .list-group-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 0.8rem 1rem;
            }
            .list-group-item span {
                flex-grow: 1;
                margin-right: 10px;
                word-break: break-all;
            }
            .list-group-item input[type="checkbox"] {
                 transform: scale(1.2);
            }
            .btn-danger {
                padding: .25rem .5rem;
                font-size: .75rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4 text-primary">習慣トラッカー</h1>

        <!-- 習慣追加 -->
        <div class="card">
            <div class="card-header">新しい習慣を追加</div>
            <div class="card-body">
                <div class="input-group">
                    <input type="text" id="newHabitInput" class="form-control" placeholder="例: 毎日読書15分">
                    <button class="btn btn-primary" id="addHabitBtn">追加</button>
                </div>
            </div>
        </div>

        <!-- 今日の習慣リスト -->
        <div class="card">
            <div class="card-header">今日の習慣 (<span id="currentDate"></span>)</div>
            <div class="card-body p-0">
                <ul class="list-group list-group-flush" id="habitList">
                    <!-- 習慣がここに動的に追加される -->
                    <!-- <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <input type="checkbox" class="form-check-input me-3" id="dummyCheckbox1">
                            <label for="dummyCheckbox1" class="mb-0">サンプル習慣1</label>
                        </div>
                        <button class="btn btn-danger btn-sm">削除</button>
                    </li> -->
                </ul>
                <p id="noHabitsMessage" class="text-muted text-center py-3 m-0" style="display: none;">まだ習慣がありません。追加してみましょう！</p>
            </div>
        </div>

        <!-- 達成率グラフ -->
        <div class="card">
            <div class="card-header">過去7日間の達成状況</div>
            <div class="card-body">
                <div class="chart-container">
                    <canvas id="habitChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS CDN (Popper.js bundled) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eRj03hSmwA7SMEU" crossorigin="anonymous"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" integrity="sha384-Fp6r/uFf+d/D3q8L0x1B6pB+C8+gB+Qj+N/M2rJ3n5t0zT6tV2F9t0+g+W/g+Z/Z" crossorigin="anonymous"></script>

    <script>
        // DOM要素の取得
        const newHabitInput = document.getElementById('newHabitInput');
        const addHabitBtn = document.getElementById('addHabitBtn');
        const habitList = document.getElementById('habitList');
        const currentDateSpan = document.getElementById('currentDate');
        const noHabitsMessage = document.getElementById('noHabitsMessage');
        const habitChartCanvas = document.getElementById('habitChart');

        // 定数
        const HABITS_STORAGE_KEY = 'habitTracker_habits';
        const LOGS_STORAGE_KEY = 'habitTracker_logs';

        // データ構造
        let habits = []; // [{ id: 'uuid', name: '習慣名', createdAt: 'timestamp' }]
        let habitLogs = {}; // { 'YYYY-MM-DD': { 'habitId': true/false, ... }, ... }

        // 現在の日付を取得 (YYYY-MM-DD形式)
        const getFormattedDate = (date = new Date()) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const today = getFormattedDate();
        currentDateSpan.textContent = today; // 今日の日付を表示

        // UUID生成関数 (シンプル版)
        const generateUUID = () => {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        };

        // LocalStorageからデータをロード
        const loadData = () => {
            try {
                const storedHabits = localStorage.getItem(HABITS_STORAGE_KEY);
                if (storedHabits) {
                    habits = JSON.parse(storedHabits);
                }
                const storedLogs = localStorage.getItem(LOGS_STORAGE_KEY);
                if (storedLogs) {
                    habitLogs = JSON.parse(storedLogs);
                }
            } catch (e) {
                console.error("Failed to load data from localStorage", e);
                // データが壊れている場合は初期化
                habits = [];
                habitLogs = {};
                saveData(); // 空のデータを保存
                alert("データの読み込みに失敗しました。データを初期化しました。");
            }
        };

        // LocalStorageにデータを保存
        const saveData = () => {
            try {
                localStorage.setItem(HABITS_STORAGE_KEY, JSON.stringify(habits));
                localStorage.setItem(LOGS_STORAGE_KEY, JSON.stringify(habitLogs));
            } catch (e) {
                console.error("Failed to save data to localStorage", e);
                alert("データの保存に失敗しました。ストレージがいっぱいか、問題が発生しています。");
            }
        };

        // 習慣リストをレンダリング
        const renderHabits = () => {
            habitList.innerHTML = ''; // リストをクリア
            if (habits.length === 0) {
                noHabitsMessage.style.display = 'block';
                return;
            } else {
                noHabitsMessage.style.display = 'none';
            }

            habits.forEach(habit => {
                const listItem = document.createElement('li');
                listItem.className = 'list-group-item d-flex justify-content-between align-items-center';

                const isCompleted = habitLogs[today] && habitLogs[today][habit.id] === true;

                listItem.innerHTML = `
                    <div>
                        <input type="checkbox" class="form-check-input me-3" id="habit-${habit.id}" ${isCompleted ? 'checked' : ''}>
                        <label for="habit-${habit.id}" class="mb-0">${habit.name}</label>
                    </div>
                    <button class="btn btn-danger btn-sm" data-habit-id="${habit.id}">削除</button>
                `;

                // チェックボックスのイベントリスナー
                const checkbox = listItem.querySelector(`#habit-${habit.id}`);
                checkbox.addEventListener('change', (event) => {
                    if (!habitLogs[today]) {
                        habitLogs[today] = {};
                    }
                    habitLogs[today][habit.id] = event.target.checked;
                    saveData();
                    updateChart(); // グラフを更新
                });

                // 削除ボタンのイベントリスナー
                const deleteButton = listItem.querySelector('button');
                deleteButton.addEventListener('click', (event) => {
                    const habitIdToDelete = event.target.dataset.habitId;
                    habits = habits.filter(h => h.id !== habitIdToDelete);
                    // 関連するログも削除（オプションだが、今回はしない。残しておいても問題ないため）
                    saveData();
                    renderHabits();
                    updateChart(); // グラフを更新
                });

                habitList.appendChild(listItem);
            });
        };

        // 新しい習慣を追加
        addHabitBtn.addEventListener('click', () => {
            const habitName = newHabitInput.value.trim();
            if (habitName) {
                habits.push({
                    id: generateUUID(),
                    name: habitName,
                    createdAt: Date.now()
                });
                newHabitInput.value = ''; // 入力フィールドをクリア
                saveData();
                renderHabits();
                updateChart(); // グラフを更新
            } else {
                alert("習慣名を入力してください。");
            }
        });

        // Enterキーで習慣を追加
        newHabitInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                addHabitBtn.click();
            }
        });

        // Chart.js インスタンス
        let habitChart;

        // グラフを更新する関数
        const updateChart = () => {
            if (habitChart) {
                habitChart.destroy(); // 既存のグラフを破棄
            }

            const labels = [];
            const data = [];
            const todayDate = new Date();

            // 過去7日間のデータを集計
            for (let i = 6; i >= 0; i--) {
                const date = new Date(todayDate);
                date.setDate(todayDate.getDate() - i);
                const formattedDate = getFormattedDate(date);
                
                labels.push(formattedDate.substring(5)); // 'MM-DD' 形式
                
                let completedCount = 0;
                if (habitLogs[formattedDate]) {
                    completedCount = Object.values(habitLogs[formattedDate]).filter(status => status === true).length;
                }
                data.push(completedCount);
            }

            habitChart = new Chart(habitChartCanvas, {
                type: 'bar', // 棒グラフに変更
                data: {
                    labels: labels,
                    datasets: [{
                        label: '達成習慣数',
                        data: data,
                        backgroundColor: 'rgba(0, 123, 255, 0.7)',
                        borderColor: 'rgba(0, 123, 255, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false // 凡例を非表示
                        },
                        title: {
                            display: true,
                            text: '過去7日間の達成習慣数',
                            font: {
                                size: 16
                            },
                            color: '#333'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '達成数',
                                font: {
                                    size: 14
                                },
                                color: '#555'
                            },
                            ticks: {
                                stepSize: 1, // 軸の目盛りを整数にする
                                callback: function(value) {if (value % 1 === 0) {return value;}}, // 整数のみ表示
                                color: '#555'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '日付',
                                font: {
                                    size: 14
                                },
                                color: '#555'
                            },
                            ticks: {
                                color: '#555'
                            }
                        }
                    }
                }
            });
        };

        // 初期化
        loadData();
        renderHabits();
        updateChart();
    </script>
</body>
</html>
