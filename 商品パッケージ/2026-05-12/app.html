<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>note向けAI×副業記事 企画・執筆ロードマップアシスタント</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9Cug65" crossorigin="anonymous">
    <style>
        body {
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 960px;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .card {
            margin-bottom: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 10px rgba(0,0,0,.05);
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            font-weight: bold;
            border-top-left-radius: 0.75rem;
            border-top-right-radius: 0.75rem;
            padding: 1rem 1.5rem;
        }
        .form-label {
            font-weight: bold;
        }
        .output-box {
            background-color: #e9ecef;
            border-radius: 0.5rem;
            padding: 1rem;
            min-height: 100px;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0b5ed7;
        }
        h1, h2, h3 {
            color: #343a40;
        }
        .chart-container {
            position: relative;
            height: 250px; /* Adjust height as needed for responsiveness */
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4 text-center">note向けAI×副業記事 企画・執筆ロードマップアシスタント</h1>
        <p class="lead text-center mb-5">2026年5月12日の未来を見据え、AI進化と働き方の多様化に対応した、5000字以上のnote記事企画・執筆を支援します。</p>

        <!-- 1. 記事テーマ・キーワード入力 -->
        <div class="card">
            <div class="card-header">1. 記事テーマ・キーワード入力</div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="mainKeywords" class="form-label">主要キーワード（例: AI、副業、生産性向上、自己実現など）</label>
                    <input type="text" class="form-control" id="mainKeywords" value="AI, 副業, 生産性向上, ロードマップ" placeholder="複数のキーワードをカンマ区切りで入力">
                </div>
                <div class="mb-3">
                    <label for="targetAudience" class="form-label">ターゲット読者層（例: 初心者、中級者、AI活用を模索する人など）</label>
                    <input type="text" class="form-control" id="targetAudience" value="AI活用に興味のある初心者, 副業を始めたい会社員" placeholder="ターゲット読者層を具体的に入力">
                </div>
                <div class="d-grid">
                    <button class="btn btn-primary" id="generateIdeasBtn">企画案を生成</button>
                </div>
            </div>
        </div>

        <!-- 2. タイトル案生成 -->
        <div class="card">
            <div class="card-header">2. タイトル案生成（AIアシスタント提案）</div>
            <div class="card-body">
                <div class="output-box mb-3" id="titleSuggestions">
                    企画案生成ボタンを押すと、魅力的なタイトル案が表示されます。
                </div>
                <div class="d-grid">
                    <button class="btn btn-outline-primary" id="copyTitlesBtn">タイトル案をコピー</button>
                </div>
            </div>
        </div>

        <!-- 3. 記事構成案生成 -->
        <div class="card">
            <div class="card-header">3. 記事構成案生成（5000文字以上対応）</div>
            <div class="card-body">
                <div class="output-box mb-3" id="articleOutline">
                    企画案生成ボタンを押すと、5000字以上の記事構成案が表示されます。
                </div>
                <div class="d-grid">
                    <button class="btn btn-outline-primary" id="copyOutlineBtn">構成案をコピー</button>
                </div>
            </div>
        </div>

        <!-- 4. 執筆ロードマップシミュレーター -->
        <div class="card">
            <div class="card-header">4. 執筆ロードマップシミュレーター（目標5000文字）</div>
            <div class="card-body">
                <p>目標文字数: <strong>5000文字</strong></p>
                <div class="mb-3">
                    <label for="dailyWords" class="form-label">1日あたりの執筆可能文字数（目安）</label>
                    <input type="number" class="form-control" id="dailyWords" value="1000" min="100">
                </div>
                <div class="mb-3">
                    <label for="targetDays" class="form-label">目標執筆日数</label>
                    <input type="number" class="form-control" id="targetDays" value="7" min="1">
                </div>
                <div class="d-grid gap-2 mb-4">
                    <button class="btn btn-primary" id="simulateBtn">ロードマップをシミュレート</button>
                </div>

                <div class="alert alert-info mt-3" id="simulationResult" role="alert" style="display: none;">
                    <strong>シミュレーション結果:</strong><br>
                    <span id="requiredDays"></span><br>
                    <span id="dailyTargetWords"></span>
                </div>

                <h5 class="mt-4">執筆進捗イメージ</h5>
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap 5 JS (Popper.js required) -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js" integrity="sha384-zYn/T0mH+BvC0hS5d9j1k2iS3a4o5p6v7j8l9k0m1n2o3p4q5r6s7t8u9v0wxyZ" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js" integrity="sha384-BB1fS5S5d9j1k2iS3a4o5p6v7j8l9k0m1n2o3p4q5r6s7t8u9v0wxyZ" crossorigin="anonymous"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0/dist/chart.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mainKeywordsInput = document.getElementById('mainKeywords');
            const targetAudienceInput = document.getElementById('targetAudience');
            const generateIdeasBtn = document.getElementById('generateIdeasBtn');
            const titleSuggestionsOutput = document.getElementById('titleSuggestions');
            const articleOutlineOutput = document.getElementById('articleOutline');
            const copyTitlesBtn = document.getElementById('copyTitlesBtn');
            const copyOutlineBtn = document.getElementById('copyOutlineBtn');

            const dailyWordsInput = document.getElementById('dailyWords');
            const targetDaysInput = document.getElementById('targetDays');
            const simulateBtn = document.getElementById('simulateBtn');
            const simulationResultDiv = document.getElementById('simulationResult');
            const requiredDaysSpan = document.getElementById('requiredDays');
            const dailyTargetWordsSpan = document.getElementById('dailyTargetWords');
            const progressChartCanvas = document.getElementById('progressChart');

            const totalWordsGoal = 5000;
            let progressChart; // Chart instance

            // --- 企画案生成ロジック ---
            generateIdeasBtn.addEventListener('click', () => {
                const keywords = mainKeywordsInput.value.split(',').map(k => k.trim()).filter(k => k !== '');
                const audience = targetAudienceInput.value.split(',').map(a => a.trim()).filter(a => a !== '');

                // タイトル案生成
                titleSuggestionsOutput.innerHTML = generateTitleSuggestions(keywords, audience);

                // 記事構成案生成
                articleOutlineOutput.innerHTML = generateArticleOutline(keywords, audience, totalWordsGoal);
            });

            function generateTitleSuggestions(keywords, audience) {
                const baseTitles = [
                    "【AI×副業】未来を拓く！月5万円を稼ぐための完全ロードマップ",
                    "2026年を見据える！AI活用で「個人の生産性」を最大化するnote術",
                    "自己実現を叶える！AI時代の新しい働き方と副業戦略5選",
                    "未経験から始めるAI副業：5000文字で語る成功への最短ルート",
                    "【未来予想】AIはあなたの副業をどう変える？実践的活用ガイド",
                    "ChatGPTで加速！5000文字で伝える、AI時代の副業戦略と自己成長",
                    "多様な働き方へシフト！AIを味方につける、あなたのキャリアロードマップ",
                    "個人の生産性革命！AIツールを駆使した副業で「時間とお金」を手に入れる方法",
                    "【実践編】AIでコンテンツ制作副業を始めるロードマップ（5000字超解説）",
                    "AIアシスタントと一緒に！あなたのスキルを収益化するnote執筆術"
                ];

                const dynamicTitles = [];
                if (keywords.length > 0) {
                    keywords.forEach(kw => {
                        audience.forEach(aud => {
                            dynamicTitles.push(`【${kw}】で差をつける！${aud}のためのAI副業ロードマップ`);
                            dynamicTitles.push(`${aud}必見！${kw}を極めるAI活用術で月収アップ`);
                        });
                    });
                }

                const suggestions = [...new Set([...baseTitles, ...dynamicTitles])].slice(0, 10); // 重複除去して最大10件

                let html = '<ul>';
                if (suggestions.length === 0) {
                    html = '<p>キーワードとターゲット読者を入力して、企画案生成ボタンを押してください。</p>';
                } else {
                    suggestions.forEach(title => {
                        html += `<li>${title}</li>`;
                    });
                    html += '</ul>';
                }
                return html;
            }

            function generateArticleOutline(keywords, audience, wordCount) {
                const keywordStr = keywords.join(', ');
                const audienceStr = audience.join(', ');

                if (keywords.length === 0 || audience.length === 0) {
                    return '<p>キーワードとターゲット読者を入力して、企画案生成ボタンを押してください。</p>';
                }

                return `
**note記事構成案（目標 ${wordCount}文字以上）**

---

**ターゲット読者:** ${audienceStr}
**テーマ:** AI進化、働き方の多様化、個人の生産性向上、自己実現を背景としたAI×副業のロードマップ

---

### **はじめに：2026年の働き方とAI副業の衝撃 (約500文字)**
*   激変する社会とAIの台頭
*   なぜ今、AIを活用した副業が求められるのか？
*   本記事で得られるもの（再現性の高いロードマップ、具体的な成功事例）

### **第1章：AI進化がもたらす「個人の生産性」革命 (約800文字)**
*   AIツールの現状と未来予測（ChatGPT, Midjourney, その他業務効率化AIなど）
*   AIが奪う仕事、AIが創る仕事
*   個人がAIを「使いこなす力」の重要性

### **第2章：【実践】AIを活用した副業の具体的な形 (約1500文字)**
*   **2-1. コンテンツ制作系副業（AIライティング、画像生成、動画編集アシスタント）**
    *   具体的なAIツールと活用事例
    *   収益化までのステップ
*   **2-2. データ分析・マーケティング系副業（AIデータ分析、広告運用支援）**
    *   AIを活用した市場分析、パーソナライズ
    *   案件獲得のコツ
*   **2-3. プログラミング・開発系副業（AIコード生成、テスト支援）**
    *   AIペアプログラマーとしての活用
    *   新しいサービスの開発事例
*   **2-4. その他、AIと既存スキルを組み合わせたニッチな副業**
    *   （例）AI通訳・翻訳、AI教育コンテンツ作成など
*   **AI副業を始めるための心構えと初期投資（無料ツール活用含む）**

### **第3章：再現性の高い「AI副業ロードマップ」5つのステップ (約1500文字)**
*   **ステップ1: 自己分析とAIスキルの棚卸し**
    *   得意なこと、興味関心、AIで補完できる部分の特定
*   **ステップ2: 目標設定と具体的なAI副業の選定**
    *   短期目標、長期目標、収益目標
    *   ポートフォリオ作成の重要性
*   **ステップ3: AIツールの学習と実践**
    *   無料学習リソース、コミュニティ活用
    *   小さな成功体験の積み重ね方
*   **ステップ4: 案件獲得とポートフォリオ構築**
    *   クラウドソーシング、SNS活用、直接営業
    *   実績の作り方
*   **ステップ5: 継続的な学習とアップデート**
    *   AI進化への追随、コミュニティでの情報交換

### **第4章：AI副業で自己実現を果たすためのマインドセット (約500文字)**
*   失敗を恐れない挑戦の重要性
*   インプットとアウトプットのサイクル
*   持続可能な働き方とワークライフバランス

### **まとめ：AIと共に、あなたの未来をデザインしよう (約200文字)**
*   本記事の要点再確認
*   読者への行動喚起
*   2026年、そしてその先へ向かうメッセージ

---

**想定読後感:**
*   AI副業の全体像が理解できた。
*   具体的なステップが明確になり、すぐにでも行動できそうだ。
*   未来への不安が希望に変わり、モチベーションが向上した。
`;
            }

            // --- コピー機能 ---
            copyTitlesBtn.addEventListener('click', () => {
                copyToClipboard(titleSuggestionsOutput.innerText);
                alert('タイトル案をコピーしました！');
            });

            copyOutlineBtn.addEventListener('click', () => {
                copyToClipboard(articleOutlineOutput.innerText);
                alert('構成案をコピーしました！');
            });

            function copyToClipboard(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                // textareaを画面外に配置してユーザーに見えないようにする
                textarea.style.position = 'fixed';
                textarea.style.top = '-9999px';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error('コピーに失敗しました', err);
                    alert('お使いのブラウザではコピー機能がサポートされていないか、ブロックされました。手動でコピーしてください。');
                } finally {
                    document.body.removeChild(textarea);
                }
            }


            // --- 執筆ロードマップシミュレーターロジック ---
            simulateBtn.addEventListener('click', () => {
                const dailyWords = parseInt(dailyWordsInput.value);
                const targetDays = parseInt(targetDaysInput.value);

                if (isNaN(dailyWords) || dailyWords <= 0) {
                    alert('1日あたりの執筆可能文字数を正しく入力してください。');
                    return;
                }
                if (isNaN(targetDays) || targetDays <= 0) {
                    alert('目標執筆日数を正しく入力してください。');
                    return;
                }

                // 必要な日数
                const requiredDays = Math.ceil(totalWordsGoal / dailyWords);
                requiredDaysSpan.innerHTML = `現在のペース（1日あたり <strong>${dailyWords.toLocaleString()}文字</strong>）だと、約 <strong>${requiredDays} 日</strong>で執筆が完了します。`;

                // 目標日数で達成するための1日あたり文字数
                const dailyWordsForTargetDays = Math.ceil(totalWordsGoal / targetDays);
                dailyTargetWordsSpan.innerHTML = `目標 <strong>${targetDays} 日</strong>で完了するには、1日あたり <strong>${dailyWordsForTargetDays.toLocaleString()} 文字</strong>の執筆が必要です。`;

                simulationResultDiv.style.display = 'block';

                updateChart(dailyWords, requiredDays);
            });

            function updateChart(dailyWords, requiredDays) {
                if (progressChart) {
                    progressChart.destroy(); // 既存のチャートを破棄
                }

                const labels = [];
                const data = [];
                let currentWords = 0;
                let displayDaysLimit = Math.max(requiredDays + 2, 7); // 最低7日、必要日数より少し多めに表示
                displayDaysLimit = Math.min(displayDaysLimit, 30); // 最大30日に制限 (チャートの可読性のため)

                for (let i = 1; i <= displayDaysLimit; i++) {
                    labels.push(`Day ${i}`);
                    currentWords = Math.min(totalWordsGoal, currentWords + dailyWords);
                    data.push(currentWords);
                    if (currentWords >= totalWordsGoal && i > requiredDays) { // 目標達成後も少しは表示
                         // break; // 特定の条件で停止するが、今回は柔軟に表示
                    }
                }
                // もし表示制限日数に達しても目標に届いていない場合、最終日に目標値をプロット
                if (currentWords < totalWordsGoal && displayDaysLimit < requiredDays) {
                    labels.push(`Day ${displayDaysLimit} (途中)`);
                    data[displayDaysLimit-1] = currentWords; // 最後に到達した文字数
                    labels.push(`Day ${requiredDays} (目標)`);
                    data.push(totalWordsGoal);
                } else if (currentWords < totalWordsGoal && displayDaysLimit >= requiredDays && labels.length < requiredDays) {
                     // 必要日数より表示日数が短いことは基本ないが、もしあれば調整
                     labels.push(`Day ${requiredDays} (目標)`);
                     data.push(totalWordsGoal);
                }


                const ctx = progressChartCanvas.getContext('2d');
                progressChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '累計執筆文字数',
                            data: data,
                            backgroundColor: 'rgba(13, 110, 253, 0.2)',
                            borderColor: 'rgba(13, 110, 253, 1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 4,
                            pointBackgroundColor: 'rgba(13, 110, 253, 1)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: '日数'
                                }
                            },
                            y: {
                                beginAtZero: true,
                                max: totalWordsGoal * 1.1, // 少し余裕を持たせる
                                title: {
                                    display: true,
                                    text: '累計文字数'
                                },
                                ticks: {
                                    callback: function(value) {
                                        return value.toLocaleString() + '字';
                                    }
                                }
                            }
                        },
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed.y !== null) {
                                            label += context.parsed.y.toLocaleString() + '字';
                                        }
                                        return label;
                                    }
                                }
                            }
                        }
                    }
                });
            }

            // ページロード時にデフォルトの入力値で各セクションを初期表示
            generateIdeasBtn.click();
            simulateBtn.click();
        });
    </script>
</body>
</html>
