<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多機能単位変換ツール</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            padding-top: 20px;
            padding-bottom: 20px;
        }
        .container {
            max-width: 700px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        h1 {
            color: #007bff;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            border-radius: 5px;
            border: 1px solid #ced4da;
            padding: 10px 15px;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus, .form-select:focus {
            border-color: #80bdff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        #resultField {
            font-weight: bold;
            color: #28a745;
            background-color: #e9f7ee;
            border-color: #d1e7dd;
            min-height: 48px; /* 入力フィールドの高さに合わせる */
            display: flex;
            align-items: center;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #6c757d;
            font-size: 0.9em;
        }

        @media (max-width: 767.98px) {
            .container {
                padding: 20px;
                margin-left: 15px;
                margin-right: 15px;
            }
            h1 {
                font-size: 1.8em;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>多機能単位変換ツール</h1>

        <div class="mb-3">
            <label for="categorySelect" class="form-label">変換カテゴリを選択:</label>
            <select class="form-select" id="categorySelect" onchange="updateUnits()">
                <option value="length">長さ</option>
                <option value="weight">重さ</option>
            </select>
        </div>

        <div class="row mb-3">
            <div class="col-md-6 mb-3 mb-md-0">
                <label for="inputValue" class="form-label">変換したい値を入力:</label>
                <input type="number" class="form-control" id="inputValue" value="1" min="0" step="any" oninput="convertUnits()">
            </div>
            <div class="col-md-6">
                <label for="fromUnitSelect" class="form-label">変換元の単位:</label>
                <select class="form-select" id="fromUnitSelect" onchange="convertUnits()">
                    <!-- Units will be populated by JavaScript -->
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label for="toUnitSelect" class="form-label">変換先の単位:</label>
            <select class="form-select" id="toUnitSelect" onchange="convertUnits()">
                <!-- Units will be populated by JavaScript -->
                </select>
        </div>

        <div class="mb-3">
            <label for="resultField" class="form-label">変換結果:</label>
            <input type="text" class="form-control" id="resultField" readonly>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2023 単位変換ツール. 全てのデータはブラウザ内で処理され、個人情報は収集されません。</p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // 単位変換データ構造
        const unitConversions = {
            length: {
                name: "長さ",
                baseUnit: "m", // メートルを基準単位とする
                units: {
                    mm: { name: "ミリメートル", toBase: 0.001 },
                    cm: { name: "センチメートル", toBase: 0.01 },
                    m: { name: "メートル", toBase: 1 },
                    km: { name: "キロメートル", toBase: 1000 },
                    inch: { name: "インチ", toBase: 0.0254 },
                    ft: { name: "フィート", toBase: 0.3048 },
                    yd: { name: "ヤード", toBase: 0.9144 },
                    mile: { name: "マイル", toBase: 1609.34 }
                }
            },
            weight: {
                name: "重さ",
                baseUnit: "g", // グラムを基準単位とする
                units: {
                    mg: { name: "ミリグラム", toBase: 0.001 },
                    g: { name: "グラム", toBase: 1 },
                    kg: { name: "キログラム", toBase: 1000 },
                    ton: { name: "トン (metric)", toBase: 1000000 }, // 1000 kg
                    oz: { name: "オンス", toBase: 28.3495 },
                    lb: { name: "ポンド", toBase: 453.592 }
                }
            }
            // 将来的に他のカテゴリもここに追加可能
            // temperature: { ... },
            // area: { ... }
        };

        /**
         * 選択されたカテゴリに基づいて、単位選択プルダウンを更新します。
         */
        function updateUnits() {
            const category = document.getElementById('categorySelect').value;
            const fromUnitSelect = document.getElementById('fromUnitSelect');
            const toUnitSelect = document.getElementById('toUnitSelect');
            const units = unitConversions[category].units;

            // 既存のオプションをクリア
            fromUnitSelect.innerHTML = '';
            toUnitSelect.innerHTML = '';

            // 新しいオプションを追加
            for (const key in units) {
                const optionFrom = document.createElement('option');
                optionFrom.value = key;
                optionFrom.textContent = `${units[key].name} (${key})`;
                fromUnitSelect.appendChild(optionFrom);

                const optionTo = document.createElement('option');
                optionTo.value = key;
                optionTo.textContent = `${units[key].name} (${key})`;
                toUnitSelect.appendChild(optionTo);
            }

            // 初期選択値を設定
            if (category === 'length') {
                fromUnitSelect.value = 'm'; // メートルから
                toUnitSelect.value = 'km'; // キロメートルへ
            } else if (category === 'weight') {
                fromUnitSelect.value = 'g'; // グラムから
                toUnitSelect.value = 'kg'; // キログラムへ
            }

            // 単位更新後、すぐに変換を実行
            convertUnits();
        }

        /**
         * 入力値と選択された単位に基づいて単位変換を実行し、結果を表示します。
         */
        function convertUnits() {
            const category = document.getElementById('categorySelect').value;
            const inputValue = parseFloat(document.getElementById('inputValue').value);
            const fromUnit = document.getElementById('fromUnitSelect').value;
            const toUnit = document.getElementById('toUnitSelect').value;
            const resultField = document.getElementById('resultField');

            // 入力値のバリデーション
            if (isNaN(inputValue) || inputValue < 0) {
                resultField.value = "無効な入力";
                return;
            }

            const unitsData = unitConversions[category].units;

            // 単位が正しく選択されているか確認
            if (!unitsData[fromUnit] || !unitsData[toUnit]) {
                resultField.value = "単位が選択されていません";
                return;
            }

            // 入力値を基準単位に変換
            const valueInBaseUnit = inputValue * unitsData[fromUnit].toBase;

            // 基準単位の値を目標単位に変換
            const result = valueInBaseUnit / unitsData[toUnit].toBase;

            // 結果を表示（小数点以下10桁まで表示し、末尾の不要なゼロを削除）
            resultField.value = result.toFixed(10).replace(/\.?0+$/, "");
        }

        // ページ読み込み時に単位選択プルダウンを初期化し、最初の変換を実行
        document.addEventListener('DOMContentLoaded', () => {
            updateUnits();
        });
    </script>
</body>
</html>
